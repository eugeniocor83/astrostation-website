<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="robots" content="noindex"></head>
<body>
<!-- Netlify Forms detection stub. Mirrors the live contact form so manual/drag-drop deploys register it. -->
<form name="contact" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
 <input type="text" name="name"><input type="email" name="email"><input type="tel" name="phone">
 <input type="text" name="location"><input type="text" name="service"><input type="text" name="budget">
 <input type="text" name="start"><textarea name="brief"></textarea>
 <input name="bot-field">
</form>
</body></html>
