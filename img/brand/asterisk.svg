<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" stroke="#000000" stroke-width="13" stroke-linecap="round">
  <!-- Astro Station — asterisk mark (pinwheel form)
       Six radial strokes at 60° intervals; each stroke curves clockwise
       (pinwheel curl), giving the mark its signature directional motion. -->

  <!-- 12 o'clock — curls clockwise (bends right as it rises) -->
  <path d="M 100,100 C 108,72 116,46 100,18"/>
  <!-- 2 o'clock — curls clockwise (bends down as it extends out) -->
  <path d="M 100,100 C 132,98 158,82 175,50"/>
  <!-- 4 o'clock — curls clockwise (bends left-down) -->
  <path d="M 100,100 C 128,118 152,144 168,168"/>
  <!-- 6 o'clock — curls clockwise (bends left as it descends) -->
  <path d="M 100,100 C 92,128 84,154 100,182"/>
  <!-- 8 o'clock — curls clockwise (bends up as it extends out) -->
  <path d="M 100,100 C 68,102 42,118 25,150"/>
  <!-- 10 o'clock — curls clockwise (bends right-up) -->
  <path d="M 100,100 C 72,82 48,56 32,32"/>
</svg>
